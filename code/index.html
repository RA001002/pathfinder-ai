%%writefile index.html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PathFinder AI</title>
<style>
:root { --bg: #0f1117; --card: #1a1d26; --accent: #4f7cff; --text: #e6e8ee; --muted: #9aa0ad; }
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }
.container { max-width: 760px; margin: 0 auto; padding: 2rem; }
header h1 { color: var(--accent); margin-bottom: 0.25rem; }
header p { color: var(--muted); }
.upload-card { background: var(--card); padding: 1.5rem; border-radius: 12px; display: flex; gap: 1rem; align-items: center; margin: 1.5rem 0; }
button { background: var(--accent); color: #fff; border: none; padding: 0.7rem 1.4rem; border-radius: 8px; cursor: pointer; font-weight: 600; }
button:disabled { opacity: 0.6; cursor: not-allowed; }
.error { color: #ff6b6b; }
.chips { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
.chip { background: #2a2f3d; padding: 0.3rem 0.7rem; border-radius: 20px; font-size: 0.85rem; }
.job-card { background: var(--card); padding: 1.2rem; border-radius: 12px; margin-bottom: 1rem; }
.job-head { display: flex; justify-content: space-between; align-items: center; }
.score { color: var(--accent); font-weight: 700; }
.company { color: var(--muted); margin: 0.2rem 0 0.6rem; }
.bar { background: #2a2f3d; height: 8px; border-radius: 4px; margin-top: 0.8rem; }
.bar-fill { background: var(--accent); height: 100%; border-radius: 4px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>PathFinder AI</h1>
    <p>Upload your resume to find your best-fit roles.</p>
  </header>
  <div class="upload-card">
    <input type="file" id="fileInput" accept=".pdf,.txt" />
    <button id="matchBtn" onclick="handleMatch()">Find Matches</button>
  </div>
  <p id="error" class="error"></p>
  <section id="results" class="results"></section>
</div>
<script>
const API = window.location.origin;
async function handleMatch() {
  const fileInput = document.getElementById('fileInput');
  const btn = document.getElementById('matchBtn');
  const errorEl = document.getElementById('error');
  const resultsEl = document.getElementById('results');
  if (!fileInput.files.length) { errorEl.textContent = "Please select a resume first."; return; }
  btn.disabled = true; btn.textContent = "Analyzing..."; errorEl.textContent = ""; resultsEl.innerHTML = "";
  const form = new FormData(); form.append("file", fileInput.files[0]);
  try {
    const res = await fetch(`${API}/api/match`, { method: "POST", body: form });
    if (!res.ok) throw new Error((await res.json()).detail || "Failed");
    renderResults(await res.json());
  } catch (e) { errorEl.textContent = e.message; } 
  finally { btn.disabled = false; btn.textContent = "Find Matches"; }
}
function renderResults(result) {
  const resultsEl = document.getElementById('results');
  let html = `<div class="profile"><h2>Detected Profile</h2><p><strong>Experience:</strong> ${result.profile.years_experience} yrs</p><div class="chips">${result.profile.skills.map(s => `<span class="chip">${s}</span>`).join('')}</div></div><h2>Top Matches</h2>`;
  result.matches.forEach(job => {
    html += `<div class="job-card"><div class="job-head"><h3>${job.title}</h3><span class="score">${job.match_score}% match</span></div><p class="company">${job.company}</p><p>${job.description}</p><div class="bar"><div class="bar-fill" style="width: ${job.match_score}%"></div></div></div>`;
  });
  resultsEl.innerHTML = html;
}
</script>
</body>
</html>
